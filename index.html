<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PRIVATE LLAMA</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
        }

        .top-bar {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-bottom: 2rem;
            align-items: center;
        }

        .toggle {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0;
            right: 0; bottom: 0;
            background-color: #ccc;
            border-radius: 24px;
            transition: 0.4s;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px; width: 20px;
            left: 2px; bottom: 2px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #f44336;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
        }

        .chat-bubbles {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 700px;
            margin-bottom: 1rem;
        }

        .bubble {
            border: 2px solid #000;
            border-radius: 20px;
            padding: 1rem;
            max-width: 45%;
            position: relative;
        }

        .bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            width: 0;
            height: 0;
        }

        .user {
            align-self: flex-end;
        }

        .user::after {
            left: 20px;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid #000;
        }

        .llm::after {
            right: 20px;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid #000;
        }

        form {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }

        textarea {
            width: 100%;
            height: 80px;
            padding: 1rem;
            font-size: 1rem;
            font-style: italic;
            border: 2px solid #aaa;
            border-radius: 20px;
        }

        button {
            padding: 0.7rem;
            border-radius: 10px;
            border: none;
            background-color: #000;
            color: white;
            cursor: pointer;
        }

        select {
            padding: 0.4rem;
            border-radius: 6px;
        }

        .history {
            font-size: 0.9rem;
            width: 100%;
            max-width: 700px;
            margin-top: 2rem;
        }

        .history-entry {
            border-top: 1px solid #ccc;
            padding-top: 0.5rem;
            margin-top: 0.5rem;
        }

    </style>
</head>
<body>
    <div class="top-bar">
        <div>History</div>
        <div>
            Techniques:
            <select name="technique" form="chatForm">
                <option value="replace" {% if technique == "replace" %}selected{% endif %}>Replace</option>
                <option value="mask" {% if technique == "mask" %}selected{% endif %}>Mask</option>
                <option value="redact" {% if technique == "redact" %}selected{% endif %}>Redact</option>
            </select>
        </div>
        <label class="toggle">
            <input type="checkbox" name="anonymize" form="chatForm" {% if anonymize %}checked{% endif %}>
            <span class="slider"></span>
        </label>
        <div>Anonymise text</div>
    </div>

    <h1>PRIVATE LLAMA</h1>

    {% if response %}
    <div class="chat-bubbles">
        <div class="bubble llm">LLM:<br>{{ response }}</div>
        <div class="bubble user">User:<br>{{ history[-1][0] }}</div>
    </div>
    {% endif %}

    <form method="POST" id="chatForm">
        <textarea name="text" placeholder="Tell us your secrets..." required></textarea>
        <button type="submit">Send</button>
    </form>

    {% if history %}
    <div class="history">
        <h3>Conversation History</h3>
        {% for user_input, reply in history %}
        <div class="history-entry">
            <strong>You:</strong> {{ user_input }}<br>
            <strong>LLM:</strong> {{ reply }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
</body>
</html>
